<!DOCTYPE html>
<html lang="es">
<head>
    <div class="logo2">Shop<span>X</span></div>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda en Línea - Ecommerce</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #333; color: white; padding: 1rem; text-align: center; }
        .products { display: flex; flex-wrap: wrap; justify-content: center; padding: 2rem; }
        .product { border: 1px solid #ddd; margin: 1rem; padding: 1rem; width: 200px; text-align: center; }
        button { background-color: #4CAF50; color: white; border: none; padding: 0.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Tienda en Línea</h1>
        <p>¡Bienvenido a nuestra tienda de ecommerce!</p>
    </header>
    <section>   
        <img class="logo2" src="https://www.pngegg.com/es/png-imnsk" 
             alt="Banner de la tienda" style="width:100%; height:auto;"> 
    </section>
    <section class="products">
        <div class="product">
            <h3>Producto 1</h3>
            <p>Descripción del producto 1.</p>
            <p>Precio: $10.00</p>
            <button>Agregar al Carrito</button>
        </div>
        <div class="product">
            <h3>Producto 2</h3>
            <p>Descripción del producto 2.</p>
            <p>Precio: $20.00</p>
            <button>Agregar al Carrito</button>
        </div>
        <div class="product">
            <h3>Producto 3</h3>
            <p>Descripción del producto 3.</p>
            <p>Precio: $30.00</p>
            <button>Agregar al Carrito</button>
        </div>
    </section>
</body>
</html>
